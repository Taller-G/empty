<div class="app-shell">
  <!-- Navigation -->
  <nav class="navbar" [class.nav-open]="menuOpen">
    <div class="container navbar-inner">
      <a routerLink="/" class="navbar-brand" (click)="closeMenu()">
        <span class="navbar-brand-icon">⬡</span>
        <span class="navbar-brand-name">dasdasdd</span>
      </a>

      <!-- Hamburger toggle (mobile only) -->
      <button
        class="navbar-toggle"
        type="button"
        aria-label="Toggle navigation"
        [attr.aria-expanded]="menuOpen"
        (click)="toggleMenu()"
      >
        <span class="hamburger-bar"></span>
        <span class="hamburger-bar"></span>
        <span class="hamburger-bar"></span>
      </button>

      <ul class="navbar-links" (click)="closeMenu()">
        <li>
          <a
            routerLink="/users"
            routerLinkActive="active"
            class="navbar-link"
          >
            Users
          </a>
        </li>
      </ul>
    </div>
  </nav>

  <!-- Main content -->
  <main class="main-content">
    <div class="container">
      <router-outlet />
    </div>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <div class="container footer-inner">
      <span>© {{ currentYear }} dasdasdd. All rights reserved.</span>
    </div>
  </footer>
</div>
