<div class="app-shell">
  <!-- Navigation -->
  <nav class="navbar">
    <div class="container navbar-inner">
      <a routerLink="/" class="navbar-brand">
        <div class="navbar-brand-icon">
          <app-icon name="home" [size]="24"></app-icon>
        </div>
        <span class="navbar-brand-name">dasdasdd</span>
      </a>

      <!-- Mobile menu button -->
      <button 
        class="mobile-menu-btn" 
        type="button"
        [attr.aria-expanded]="isMobileMenuOpen"
        aria-controls="navbar-menu"
        (click)="toggleMobileMenu()"
      >
        <span class="sr-only">Toggle navigation menu</span>
        <app-icon 
          [name]="isMobileMenuOpen ? 'close' : 'menu'" 
          [size]="20"
          className="mobile-menu-icon"
        ></app-icon>
      </button>

      <!-- Navigation links -->
      <div 
        id="navbar-menu"
        class="navbar-menu" 
        [class.open]="isMobileMenuOpen"
      >
        <ul class="navbar-links">
          <li>
            <a
              routerLink="/users"
              routerLinkActive="active"
              class="navbar-link"
              (click)="closeMobileMenu()"
            >
              <app-icon name="users" [size]="18"></app-icon>
              <span>Users</span>
            </a>
          </li>
          <li>
            <a
              routerLink="/about"
              routerLinkActive="active"
              class="navbar-link"
              (click)="closeMobileMenu()"
            >
              <app-icon name="info" [size]="18"></app-icon>
              <span>About</span>
            </a>
          </li>
          <li>
            <a
              routerLink="/weather"
              routerLinkActive="active"
              class="navbar-link"
              (click)="closeMobileMenu()"
            >
              <app-icon name="weather" [size]="18"></app-icon>
              <span>Weather</span>
            </a>
          </li>
        </ul>
      </div>

      <!-- Mobile menu overlay -->
      @if (isMobileMenuOpen) {
        <div class="mobile-menu-overlay" (click)="closeMobileMenu()"></div>
      }
    </div>
  </nav>

  <!-- Main content -->
  <main class="main-content">
    <div class="container">
      <router-outlet />
    </div>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <div class="container footer-inner">
      <span>© {{ currentYear }} dasdasdd. All rights reserved.</span>
    </div>
  </footer>
</div>
